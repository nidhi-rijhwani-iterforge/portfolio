<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <!-- Header Section -->
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">Nidhi Rijhwani</a>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#projects">Projects</a></li>
                    <li><a href="index.html#skills">Skills</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                    <li><a href="#studentForm">Registration</a></li>
                </ul>
                <a href="index.html#contact" class="btn-hire">Hire Me</a>
            </nav>
        </div>
    </header>
    <!-- Header End-->

    <section class="registration-section">
        <div class="container">

            <!-- Toast Notification for Success Alerts -->
            <div id="toastNotification" class="toast hidden"></div>

            <!--Student Table View - joh visible hi hona chaiye -->
            <div id="tableView">
                <div class="table-header-bar">
                    <h2 class="form-header table-title">
                        Registrated Students
                    </h2>
                    <div class="table-controls">
                        <div class="search-container">
                            <input type="text" name="searchBox" id="searchBox" placeholder="Search by name, email, mobile, birthday!">
                        </div>
                        <button id="showAddFormBtn" class="btn-add">Add Student</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="student-table" id="studentTable">
                        <thead>
                            <tr>
                                <th>Sr. No</th>
                                <th class="sortable" data-column="firstName">First Name</th>
                                <th class="sortable" data-column="lastName">Last Name</th>
                                <th class="sortable" data-column="gender">Gender</th>
                                <th class="sortable" data-column="email">Email ID</th>
                                <th class="sortable" data-column="mobile">Mobile Number</th>
                                <th class="sortable" data-column="birthDate">Birth Date</th>
                                <th>About Me</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                            <!-- Dynamic Rows yahan aayegi (data ohlala)-->
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination-container">
                    <button id="prevPageBtn" class="btn-pagination">Previous</button>
                    <span id="pageInfo">Page 1 of 1</span>
                    <button id="nextPageBtn" class="btn-pagination">Next</button>
                </div>

            </div>

            <!-- Form View (Hidden by default) -->
            <div id="formView" class="hidden">
                <form id="studentForm" class="student-form" onsubmit="validateForm(event)">

                    <h2 class="form-header" id="formTitle">Student Registration Form</h2>

                    <div class="row">
                        <!-- First Name -->
                        <div class="form-group">
                            <input type="text" name="firstName" id="firstName" placeholder=" ">
                            <label for="firstName">First Name</label>
                            <small class="error" id="firstNameError"></small>
                        </div>
                        <!-- First Name Ends-->

                        <!-- Middle Name -->
                        <div class="form-group">
                            <input type="text" name="middleName" id="middleName" placeholder=" ">
                            <label for="middleName">Middle Name</label>
                            <small class="error" id="middleNameError"></small>
                        </div>
                        <!-- Middle Name Ends -->

                        <!-- Last Name -->
                        <div class="form-group">
                            <input type="text" name="lastName" id="lastName" placeholder=" ">
                            <label for="lastName">Last Name</label>
                            <small class="error" id="lastNameError"></small>
                        </div>
                        <!-- Last Name Ends -->
                    </div>

                    <!-- Gender -->
                    <div class="gender-group">
                        <label for="gender" class="gender-title">Gender</label>
                        <div class="radio-group">
                            <label class="radio-card">
                                <input type="radio" name="gender" value="male">
                                Male
                            </label>
                            <label class="radio-card">
                                <input type="radio" name="gender" value="female">
                                Female
                            </label>
                        </div>
                        <small class="error" id="genderError"></small>
                    </div>
                    <!-- Gender Ends -->

                    <div class="row">
                        <!-- Email -->
                        <div class="form-group">
                            <input type="email" name="email" id="email" placeholder=" ">
                            <label for="email">Email ID</label>
                            <small class="error" id="emailError"></small>
                        </div>
                        <!-- Email Ends-->

                        <!-- Mobile -->
                        <div class="form-group">
                            <input type="tel" name="mobile" id="mobile" placeholder=" ">
                            <label for="mobile">Mobile Number</label>
                            <small class="error" id="mobileError"></small>
                        </div>
                        <!-- Mobile Ends-->
                    </div>

                    <!-- Birth Date -->
                    <div class="form-group">
                        <input type="date" name="birth" id="birthDate">
                        <label for="birthDate" class="date-label">Birth Date</label>
                        <small class="error" id="birthDateError"></small>
                    </div>
                    <!-- Birth Date Error-->

                    <!--Enable Button -->
                    <div class="checkbox-group">
                        <input type="checkbox" name="enableAbout" id="enableAbout">
                        <label for="enableAbout">Enable About ME</label>
                    </div>
                    <!-- Enable Btn Ends-->

                    <!-- About ME -->
                    <div class="form-group">
                        <textarea  
                        id="aboutMe" 
                        rows="5" 
                        maxlength="1024" 
                        placeholder=" " 
                        disabled></textarea>
                        <label for="aboutMe">About Me</label>
                        <div class="counter">
                            <span id="charCount">0</span>/1024 Characters
                        </div>
                        <small class="error" id="aboutMeError"></small>
                    </div>
                    <!-- About ME Ends-->

                    <!-- Action Button -->
                    <div class="btn-container form-actions">
                        <button type="submit" id="submitFormBtn"> REGISTER </button>
                        <button type="button" id="resetFormBtn" class="btn-reset" disabled> RESET </button>
                        <button type="button" id="cancelFormBtn" class="btn-cancel"> CANCEL </button>
                    </div>
                    <!-- Action Button Ends -->
                </form>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
